<input
  [id]="id()"
  class="uc-input-control"
  [class.uc-input-error]="$safeNavigationMigration(errors?.())"
  [class.uc-input-disabled]="disabled()"
  type="checkbox"
  [disabled]="disabled()"
/>

<div
  class="uc-checkbox"
  [class.selected]="checked()"
  [class.disabled]="disabled()"
  (click)="toggleCheckbox()"
>
  @if (checked()) {
    <i class="ph-bold ph-check"></i>
  }
</div>

@if (label()) {
  <label class="uc-input-label" [for]="id()">{{ label() }}</label>
}
