<button
  class="uc-button uc-{{variant()}} uc-size-{{size()}}"
  [class.uc-disabled]="disabled()"
  [disabled]="disabled()"
  [style.justify-content]="align()"
  (click)="onClick($event)"
  [type]="type()"
>
  <ng-content select="[ucButtonPrefix]"></ng-content>
  {{ text() }}
  <ng-content select="[ucButtonSuffix]"></ng-content>
</button>
