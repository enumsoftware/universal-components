<button
  class="uc-button uc-{{variant()}}"
  [class.uc-disabled]="disabled()"
  [disabled]="disabled()"
  [style.justify-content]="align()"
  (click)="onClick($event)"
  [type]="type()"
>
  <ng-content select="[ucPrefix]"></ng-content>
  {{ text() }}
  <ng-content select="[ucSuffix]"></ng-content>
</button>
