<button
  class="uc-button"
  [class.primary-color]="variant() === 'primary'"
  [class.secondary-color]="variant() === 'secondary'"
  [class.uc-button--padded]="padded()"
  (click)="onClicked()"
>
  @if (iconPosition() === 'start') {
    <i class="ph-bold ph-{{ phosphorIcon() }}"></i>
  }
  <span> {{ text() }} </span>
  @if (iconPosition() === 'end') {
    <i class="ph-bold ph-{{ phosphorIcon() }}"></i>
  }
</button>
