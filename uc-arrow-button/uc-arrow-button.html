<button
  class="uc-button"
  [ngClass]="{
    'primary-color': variant() == 'primary',
    'secondary-color': variant() == 'secondary',
  }"
  (click)="onClicked()"
>
  @if (iconPosition() === 'start') {
    <i class="ph-bold ph-{{ phosphorIcon() }}"></i>
  }
  <span> {{ text() }} </span>
  @if (iconPosition() === 'end') {
    <i class="ph-bold ph-{{ phosphorIcon() }}"></i>
  }
</button>
