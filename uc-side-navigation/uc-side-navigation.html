<section
  #layoutRoot
  cdkOverlayOrigin
  #overlayOrigin="cdkOverlayOrigin"
  [class.uc-wrapper-over]="sidebarMode() === 'over'"
  [class.uc-wrapper-side]="sidebarMode() === 'side'"
>
  <ng-template #sidebarHeaderTemplate>
    <ng-content select="[ucSidebarHeader]" />
  </ng-template>

  <ng-template #sidebarBodyTemplate>
    <ng-content select="uc-sidebar">Sidebar</ng-content>
  </ng-template>

  <ng-template #sidebarFooterTemplate>
    <ng-content select="[ucSidebarFooter]" />
  </ng-template>

  @if (sidebarMode() === 'side') {
    <aside
      [id]="instanceId()"
      [class.uc-sidebar-opened]="isSidebarOpen()"
      [class.uc-sidebar-closed]="!isSidebarOpen()"
      class="uc-sidebar-side"
      [attr.inert]="!isSidebarOpen() ? '' : null"
      [attr.aria-hidden]="!isSidebarOpen() ? 'true' : 'false'"
    >
      <div class="uc-sidebar-layout">
        <div class="uc-sidebar-header">
          <ng-container [ngTemplateOutlet]="sidebarHeaderTemplate" />
        </div>

        <div
          class="uc-sidebar-scroll-wrapper"
          [class.uc-sidebar-scroll-wrapper-enabled]="sidebarScrollable()"
        >
          <div
            class="uc-sidebar-scroll-content"
            [class.uc-sidebar-scroll-content-enabled]="sidebarScrollable()"
          >
            <ng-container [ngTemplateOutlet]="sidebarBodyTemplate" />
          </div>
        </div>

        <div class="uc-sidebar-footer">
          <ng-container [ngTemplateOutlet]="sidebarFooterTemplate" />
        </div>
      </div>
    </aside>
  }

  @if (sidebarMode() === 'over') {
    <ng-template
      cdkConnectedOverlay
      [cdkConnectedOverlayOpen]="isOverlayMounted()"
      [cdkConnectedOverlayOrigin]="overlayOrigin"
      [cdkConnectedOverlayPositions]="overlayPositions"
      [cdkConnectedOverlayHasBackdrop]="true"
      [cdkConnectedOverlayBackdropClass]="'uc-sidebar-cdk-backdrop'"
      [cdkConnectedOverlayPush]="false"
      [cdkConnectedOverlayFlexibleDimensions]="false"
      (backdropClick)="onOverlayBackdropClick()"
    >
      <aside
        [id]="instanceId()"
        class="uc-sidebar-over"
        [class.uc-sidebar-opened]="isOverlayVisible()"
        [class.uc-sidebar-closed]="!isOverlayVisible()"
        [style.block-size.px]="overlayHeightPx()"
        [style.max-inline-size.px]="overlayMaxWidthPx()"
      >
        <div class="uc-sidebar-layout">
          <div class="uc-sidebar-header">
            <ng-container [ngTemplateOutlet]="sidebarHeaderTemplate" />
          </div>

          <div
            class="uc-sidebar-scroll-wrapper"
            [class.uc-sidebar-scroll-wrapper-enabled]="sidebarScrollable()"
          >
            <div
              class="uc-sidebar-scroll-content"
              [class.uc-sidebar-scroll-content-enabled]="sidebarScrollable()"
            >
              <ng-container [ngTemplateOutlet]="sidebarBodyTemplate" />
            </div>
          </div>

          <div class="uc-sidebar-footer">
            <ng-container [ngTemplateOutlet]="sidebarFooterTemplate" />
          </div>
        </div>
      </aside>
    </ng-template>
  }

  <main
    [class.uc-content-over]="sidebarMode() === 'over'"
    [class.uc-content-side]="sidebarMode() === 'side'"
  >
    <ng-content>Content</ng-content>
  </main>
</section>
