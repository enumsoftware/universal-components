<button
  class="uc-image-button uc-{{ variant() }}"
  title=""
  (click)="onClick($event)"
  [class.inverse-color]="inverseColor()"
  [class.uc-image-button--disabled]="disabled()"
  [disabled]="disabled()"
  [attr.aria-disabled]="disabled()"
>
  @if (phosphorIcon()) {
    <i class="ph-{{ phosphorWeight() }} ph-{{ phosphorIcon() }} text-2xl"></i>
  } @else {
    <ng-content></ng-content>
  }
</button>
